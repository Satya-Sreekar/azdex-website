<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AZDEX Chemicals</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: https://github.com/rafgraph/spa-github-pages
      // Redirects deep links to index.html while preserving the route, so the
      // React Router SPA can render it. 0 segments: served from the custom
      // domain root (azdex.co.in), no project-page base path.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
